# ═══════════════════════════════════════════════════════════════
# Nav2 configuration for EXP2 robot
# ═══════════════════════════════════════════════════════════════

amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.1
    alpha2: 0.05
    alpha3: 0.05
    alpha4: 0.05
    alpha5: 0.05
    base_frame_id: base_link
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: map
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 10.0
    laser_min_range: 0.01
    laser_model_type: likelihood_field
    max_beams: 200

    # ── 粒子数：5000 兼顾全局定位与常规跟踪，KLD 采样自适应 ──
    max_particles: 5000
    min_particles: 500

    odom_frame_id: odom
    pf_err: 0.05
    pf_z: 0.99

    # ── 恢复机制（全局定位关键）──
    # 收敛失败时注入随机粒子自救，稀疏特征场景必备
    recovery_alpha_fast: 0.1
    recovery_alpha_slow: 0.01

    resample_interval: 1
    robot_model_type: nav2_amcl::DifferentialMotionModel
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 0.5
    update_min_a: 0.1
    update_min_d: 0.25
    z_hit: 0.95
    z_max: 0.05
    z_rand: 0.05
    z_short: 0.05
    scan_topic: /scan

    # ── 默认初始位姿（全局定位时被 reloc_manager 大协方差覆盖）──
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    # [CHANGED] 主动重规划替代被动重规划，满足"2分钟防卡死"需求
    default_nav_to_pose_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: ""
    # plugin_lib_names removed — Jazzy auto-discovers BT plugins, explicit listing causes double registration
    error_code_names:
      - ""
    qos_overrides:
      /goal_pose:
        subscription:
          reliability: RELIABLE

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 20.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 20.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.03
      yaw_goal_tolerance: 0.05

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 1.0
      # [CHANGED] 0.6→0.8 提前看更远，转弯预判更充分
      lookahead_dist: 0.8
      min_lookahead_dist: 0.4
      max_lookahead_dist: 1.0
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 0.3
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 4.0
      # [CHANGED] 1.0→1.5 更早碰撞预警
      max_allowed_time_to_collision_up_to_carrot: 1.5
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      # [CHANGED] 1.5→0.8 障碍物降速更渐进
      cost_scaling_dist: 0.8
      # [CHANGED] 1.5→1.0 降速幅度更平缓
      cost_scaling_gain: 1.0
      # [CHANGED] 0.5→0.9 不急刹，有inflation兜底
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.1
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.5
      use_rotate_to_heading: true
      # [CHANGED] 0.4(23°)→0.6(34°) 小角度行驶中微调
      rotate_to_heading_min_angle: 0.6
      # [CHANGED] 1.0→0.5 转弯启停更柔和
      max_angular_accel: 0.5
      max_linear_accel: 1.0
      max_robot_pose_search_dist: 1.0
      use_collision_detection: true

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 5.0
      # EKF (odom+IMU) 上线后改回 odom — 平滑无跳变, 不再依赖 AMCL 修正
      global_frame: odom
      robot_base_frame: base_link
      # [CHANGED] robot_radius→footprint 多边形，精确建模50cm×50cm车体
      footprint: "[[0.08,0.25],[-0.42,0.25],[-0.42,-0.25],[0.08,-0.25]]"
      resolution: 0.05
      rolling_window: true
      width: 8
      height: 8
      transform_tolerance: 0.5
      always_send_full_costmap: true
      plugins: ["voxel_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: false
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.01
          obstacle_max_range: 2.5
          obstacle_min_range: 0.01
          observation_keep_time: 2.0
          expected_update_rate: 0.1

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        # [CHANGED] 0.1→0.3 车体边缘外30cm均匀缓冲
        inflation_radius: 0.3
        # [CHANGED] 2.5→1.0 代价梯度平缓，速度过渡更平滑
        cost_scaling_factor: 1.0

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      # [CHANGED] robot_radius→footprint 多边形，与local_costmap一致
      footprint: "[[0.08,0.25],[-0.42,0.25],[-0.42,-0.25],[0.08,-0.25]]"
      resolution: 0.05
      track_unknown_space: true
      always_send_full_costmap: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        transform_tolerance: 0.5
        observation_sources: scan
        combination_method: 1
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.01
          # [CHANGED] 2.5→5.0 全局提前感知远处障碍
          obstacle_max_range: 5.0
          obstacle_min_range: 0.01
          observation_keep_time: 2.0
          expected_update_rate: 0.1
          transform_tolerance: 0.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        # [CHANGED] 0.1→0.3 与local_costmap一致
        inflation_radius: 0.3
        # [CHANGED] 2.5→1.0 与local_costmap一致
        cost_scaling_factor: 1.0

map_server:
  ros__parameters:
    use_sim_time: false

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.5
      allow_unknown: false
      downsample_costmap: false
      downsampling_factor: 1
      max_iterations: 10000
      max_on_approach_iterations: 1000
      max_planning_time: 8.0
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false
      # [CHANGED] REEDS_SHEPP→DUBIN 需求"无倒退"，消除cusp尖点
      motion_model_for_search: "DUBIN"
      angle_quantization_bins: 72
      # [CHANGED] 3.5→3.0 路径略松弛，给smoother留余量
      analytic_expansion_ratio: 3.0
    costmap_topic: /global_costmap/costmap_raw

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: false
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.3
    min_rotational_vel: 0.1
    rotational_acc_lim: 2.0

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    # [KEPT] OPEN_LOOP 先不动，等基础参数验证后再切CLOSED_LOOP
    feedback: "OPEN_LOOP"
    max_velocity: [0.8, 0.0, 0.23]
    min_velocity: [-0.3, 0.0, -0.3]
    max_accel: [0.8, 0.0, 0.6]
    max_decel: [-1.0, 0.0, -1.0]
    odom_topic: "odometry/filtered"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
    # [REMOVED] enable_odometry_subscription — 源码中不存在此参数

collision_monitor:
  ros__parameters:
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.5
    source_timeout: 5.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    polygons: ["PolygonStop"]
    PolygonStop:
      type: "polygon"
      # [CHANGED] 修正为实际车体尺寸50cm×50cm，与costmap footprint一致
      points: "[[0.08,0.25],[-0.42,0.25],[-0.42,-0.25],[0.08,-0.25]]"
      action_type: "stop"
      min_points: 4
      visualize: True
      polygon_pub_topic: "polygon_stop"
      enabled: True
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "scan"
      enabled: True

lifecycle_manager_slam:
  ros__parameters:
    use_sim_time: false
    bond_timeout: 10.0
    autostart: true

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    bond_timeout: 10.0
    autostart: true

docking_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 50.0
    dock_plugins: ["simple_charging_dock"]
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      database: "none"
      staging_x_offset: -0.3

# ─────────────────────────────────────────────────────────────
# 重定位管理器参数
# ─────────────────────────────────────────────────────────────
reloc_manager:
  ros__parameters:
    use_sim_time: false

    # ══ 重定位模式 ══
    # 'mh'     = 默认: 单帧匹配在此环境多解(实测真值常非最优), 不盲信 matcher。
    #           发宽协方差 initialpose 覆盖窗口内多模态 → 不旋转, 收敛期动态降 AMCL 运动门限,
    #           静止 1~5s 协方差收敛到真值(cov<阈值→CONVERGED)。matcher 仅做 top-N 诊断。
    # 'rotate' = v1 兜底: 360°旋转 + AMCL(约33s), 仅 reloc_mode=rotate 时用
    reloc_mode: mh
    scan_map_yaml: /home/expressone/maps/my_map.yaml  # mh 诊断 matcher 用的地图
    scan_cap_m: 8.0            # 扫描渲染半径上限(m)

    # ── mh 模式参数 ──
    mh_cov_xy: 0.5             # initialpose xy 协方差(σ², σ≈0.7m; 收紧信任点击,排除>1.4m假吸引子。点偏多则调大)
    mh_cov_yyaw: 0.3           # yaw 协方差(rad², σ≈31°; 收紧排除反向假模态。点击方向不准则调大)
    mh_topk: 5                 # top-N 多解诊断候选数
    # mh 诊断 matcher 粗搜参数(仅日志展示多解, 不决定位姿)
    mh_window_m: 2.0           # 点击位置窗口半径(m)
    mh_coarse_step_m: 1.0      # 粗搜网格(m)
    mh_coarse_yaw_step_deg: 10
    mh_trim_frac: 0.85         # 取贴合最好85%(扔15%动态杂物离群)

    # ── 充电桩在地图中的固定坐标（需根据实际场地标定）──
    dock:
      x: 1.768
      y: 3.188
      yaw: 2.361   # ≈135° (0.7382, 0.6746 quat)

    # ── 全局定位初始协方差（大值触发粒子撒满全图）──
    manual_cov_xx: 1.0
    manual_cov_yy: 1.0
    manual_cov_yyaw: 0.5

    # ── 收敛判定阈值 ──
    # 位置协方差对角元均低于此值 → 认为已收敛
    converged_xy_cov: 0.1    # 0.2m 标准差

    # ── 全局定位超时 ──
    localize_timeout_sec: 60.0   # 60 秒未收敛 → 告警，提示用充电桩标定

    # ── 粒子数由 AMCL 的 max_particles + KLD 采样自适应管理 ──
